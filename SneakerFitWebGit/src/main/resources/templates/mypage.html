<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>マイページ</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

	<!-- ヘッダー -->
	<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
		<div class="container">
			<a class="navbar-brand" th:href="@{/}">Sneaker<span class="fw-bold">Fit</span></a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarNav">
				<ul class="navbar-nav ms-auto">
					<li class="nav-item"><a class="nav-link" th:href="@{/}">Home</a></li>
					<li class="nav-item"><a class="nav-link" th:href="@{/about}">About</a></li>
					<li class="nav-item" sec:authorize="isAuthenticated()">
						<form th:action="@{/logout}" method="POST">
							<button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
						</form>
					</li>
				</ul>
			</div>
		</div>
	</nav>
	<!-- ここまでヘッダー -->

	<div class="container py-5 flex-grow-1">
		<div class="mx-auto" style="max-width: 60%;">

			<!-- タイトル -->
			<h2 class="fw-bold mb-4">マイページ</h2>

			<!-- アカウント情報 -->
			<div class="card shadow-sm mb-4 border-0">
				<div class="card-body">
					<h5 class="fw-bold mb-3">アカウント情報</h5>
					<p><strong>ユーザーID : </strong><span th:text="${userId}"></span></p>

					<!-- アカウント削除ボタン -->
					<div class="text-end">
						<button type="button" class="btn btn-danger btn-sm" data-bs-toggle="modal"
							data-bs-target="#deleteModal">
							アカウントを削除する
						</button>
					</div>
				</div>
			</div>

			<!-- 自分のレビュー一覧 -->
			<h5 class="fw-bold mb-3">投稿したレビュー</h5>

			<!-- レビューなし -->
			<div th:if="${reviewList == null or #lists.isEmpty(reviewList)}" class="alert alert-secondary text-center">
				まだレビューを投稿していません。
			</div>

			<!-- レビューカード -->
			<div th:each="review : ${reviewList}" class="card shadow-sm mb-4 border-0">
				<div class="card-body">
					<h3 class="mb-1">
						<span class="text-muted small">モデル名 :</span>
						<span class="fw-bold" th:text="${review.modelName}"></span>
					</h3>
					<p class="text-muted mb-3" th:text="${review.manufacturerName}"></p>
					<hr>
					<div class="row small mb-3">
						<div class="col-md-3"><strong>サイズ(cm): </strong><span th:text="${review.shoeSize}"></span></div>
						<div class="col-md-3"><strong>足長(cm): </strong><span th:text="${review.footLength}"></span>
						</div>
						<div class="col-md-3"><strong>足幅(cm): </strong><span th:text="${review.footWidth}"></span></div>
						<div class="col-md-3"><strong>甲高(cm): </strong><span th:text="${review.instepHeight}"></span>
						</div>
					</div>
					<div class="p-3 bg-light rounded">
						<p class="mb-0" style="white-space: pre-wrap; line-height: 1.8;" th:text="${review.comment}">
						</p>
					</div>
				</div>
			</div>

			<div class="text-center mt-3">
				<a th:href="@{/}" class="text-decoration-none">トップページに戻る</a>
			</div>

		</div>
	</div>

	<!-- 削除確認モーダル -->
	<div class="modal fade" id="deleteModal" tabindex="-1">
		<div class="modal-dialog">
			<div class="modal-content">
				<div class="modal-header">
					<h5 class="modal-title">アカウント削除の確認</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
				</div>
				<div class="modal-body">
					<p>本当にアカウントを削除しますか？</p>
					<p class="text-danger small">※投稿したレビューはそのまま残ります。</p>
				</div>
				<div class="modal-footer">
					<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
					<form th:action="@{/delete-account}" method="POST">
						<button type="submit" class="btn btn-danger">削除する</button>
					</form>
				</div>
			</div>
		</div>
	</div>
	<!-- ここまでモーダル -->

	<!-- フッター -->
	<footer class="bg-dark text-white mt-5 py-4">
		<div class="container text-center">
			<h5 class="mb-3">SneakerFit</h5>
			<p class="mb-0 small">© 2026 SneakerFit. All rights reserved.</p>
		</div>
	</footer>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
