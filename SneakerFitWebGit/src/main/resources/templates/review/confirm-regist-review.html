<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>レビュー登録確認</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style2.css}">
</head>

<body class="bg-body-tertiary">

	<main class="container py-5">

		<div class="row justify-content-center">
			<div class="col-12 col-md-10 col-lg-8">

				<div class="card shadow border-0 mb-4">
					<div class="card-body p-4" th:object="${reviewRegistForm}">

						<h1 class="text-center fw-bold mb-4">レビュー登録確認</h1>

						<!-- レビュー内容 -->
						<div class="mb-3">
							<h2 class="fw-semibold">
								メーカー名：<span th:text="*{manufacturerName}"></span><br>
								モデル : <span th:text="*{modelName}"></span>
							</h2>

							<h3 class="mb-3">
								履いたサイズ：<span th:text="*{shoeSize}"></span>cm
							</h3>

							<div class="d-flex justify-content-between mb-3 flex-wrap">
								<span>足長：<b th:text="*{footLength}"></b>cm</span>
								<span>足幅：<b th:text="*{footWidth}"></b>cm</span>
								<span>甲高：<b th:text="*{instepHeight}"></b>cm</span>
							</div>

							<p class="border rounded p-3 bg-light" th:text="*{comment}"></p>
						</div>

						<!-- 登録実行ボタン -->
						<form th:action="@{/confirm-regist-review}" method="POST" th:object="${reviewRegistForm}"
							class="d-grid gap-2 mb-2">
							<input type="hidden" th:field="*{manufacturerId}">
							<input type="hidden" th:field="*{modelName}">
							<input type="hidden" th:field="*{shoeSize}">
							<input type="hidden" th:field="*{footLength}">
							<input type="hidden" th:field="*{footWidth}">
							<input type="hidden" th:field="*{instepHeight}">
							<input type="hidden" th:field="*{comment}">
							<input type="submit" value="登録実行" class="btn btn-success">
						</form>

						<!-- 戻るボタン -->
						<form th:action="@{/back-review-form}" method="POST" th:object="${reviewRegistForm}"
							class="d-grid gap-2">
							<input type="hidden" th:field="*{manufacturerId}">
							<input type="hidden" th:field="*{modelName}">
							<input type="hidden" th:field="*{shoeSize}">
							<input type="hidden" th:field="*{footLength}">
							<input type="hidden" th:field="*{footWidth}">
							<input type="hidden" th:field="*{instepHeight}">
							<input type="hidden" th:field="*{comment}">
							<input type="submit" value="もどる" class="btn btn-secondary">
						</form>

					</div>
				</div>

			</div>
		</div>

	</main>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
