<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>完了</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="bg-body-tertiary">

	<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
		<div class="card shadow-sm p-4 text-center" style="max-width: 420px; width: 100%;">

			<h2 class="fw-bold mb-3">完了</h2>
			<p class="mb-2">処理が完了しました。</p>
			<p class="fw-semibold mb-4" th:text="${msg}"></p>

			<a th:href="@{/}" class="btn btn-outline-secondary w-100">メニューに戻る</a>

		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
