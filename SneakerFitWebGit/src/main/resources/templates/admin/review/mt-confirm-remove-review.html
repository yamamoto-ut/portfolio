<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>削除確認画面</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="bg-light">

	<div class="container py-5">

		<h1 class="text-center mb-4">レビュー削除の確認</h1>

		<div th:object="${mtReviewRemoveForm}" class="card shadow-sm mb-4">
			<div class="card-body">

				<!-- レビューID / メーカー / モデル -->
				<h5 class="card-title">
					レビューID: <span th:text="*{reviewId}"></span><br>
					メーカー名: <span th:text="*{manufacturerName}"></span><br>
					モデル名: <span th:text="*{modelName}"></span>
				</h5>

				<hr>

				<!-- サイズ情報 -->
				<div class="row mb-3">
					<div class="col-md-3"><strong>履いたサイズ:</strong> <span th:text="*{shoeSize}"></span> cm</div>
					<div class="col-md-3"><strong>足長:</strong> <span th:text="*{footLength}"></span> cm</div>
					<div class="col-md-3"><strong>足幅:</strong> <span th:text="*{footWidth}"></span> cm</div>
					<div class="col-md-3"><strong>甲高:</strong> <span th:text="*{instepHeight}"></span> cm</div>
				</div>

				<!-- コメント -->
				<div class="p-3 bg-light rounded mb-3">
					<p th:text="*{comment}" style="white-space: pre-wrap; line-height: 1.6;"></p>
				</div>

				<!-- 削除フォーム -->
				<form th:action="@{/mt-confirm-remove-review}" method="POST" th:object="${mtReviewRemoveForm}"
					class="d-inline">
					<input type="hidden" th:field="*{reviewId}">
					<input type="hidden" th:field="*{manufacturerId}">
					<input type="hidden" th:field="*{modelName}">
					<input type="hidden" th:field="*{shoeSize}">
					<input type="hidden" th:field="*{footLength}">
					<input type="hidden" th:field="*{footWidth}">
					<input type="hidden" th:field="*{instepHeight}">
					<input type="hidden" th:field="*{comment}">
					<button type="submit" class="btn btn-danger me-2">削除の実行</button>
				</form>

				<!-- 戻るフォーム @{/mt-search-review}-->
				
				<form th:action="@{/search-review}" method="get" th:object="${mtReviewRemoveForm}" class="d-inline">
					<input type="hidden" th:field="*{reviewId}">
					<input type="hidden" th:field="*{manufacturerId}">
					
					<button type="submit" class="btn btn-secondary">もどる</button>
				</form>

			</div>
		</div>

	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
