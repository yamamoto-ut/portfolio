<!--mt-manufacturer-List.html-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>一覧</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/review.css}">
</head>

<body class="bg-light">
	<div class="container mx-auto w-80">

		<!--	削除失敗のエラー用メッセージ-->
		<div th:if="${errorMsg}" class="error-msg">
			<p th:text="${errorMsg}"></p>
		</div>
		<h2>検索</h2>
		<form th:action="@{/admin/manufacturer-search}" method="get" th:object="${searchForm}">
			【メーカー名】（部分一致）<br>
			<input type="text" th:field="*{manufacturerName}"><br>
			<br>
			<input type="submit" value="メーカー  一覧を表示する" class="btn btn-primary mb-3">
		</form>
		<!--検索に該当しなければ、メッセージ-->
		<div th:if="${msg}" class="alert alert-warning mt-2" th:text="${msg}"></div>

		<!--th:if 属性 nullじゃないなら表示する-->
		<div th:if="${manufacturerList} != null" class="card p-3 shadow-sm mx-auto mb-4">
			<h2 class="text-center">一覧</h2>

			<table class=" table table-striped table-hover text-center">
				<thead>
					<tr>
						<th>メーカーID</th>
						<th>メーカー名</th>
						<th>レビュー数</th>
						<div sec:authorize="hasRole('ADMIN')">
							<th>削除</th>
						</div>
					</tr>
				</thead>
				<tbody>
					<!--th:each 属性--タイムリーフ用の書き方、拡張for文のような書き方-->
					<tr th:each="manufacturer : ${manufacturerList}">
						<td th:text="${manufacturer.manufacturerId}"></td>
						<td th:text="${manufacturer.manufacturerName}"></td>
						<td th:text="${manufacturer.reviewCnt}"></td>

						<td>
							<div sec:authorize="hasRole('ADMIN')">
								<form th:action="@{/mt-remove-manufacturer}" method="POST">
									<input type="hidden" name="manufacturerId"
										th:value="${manufacturer.manufacturerId}">
									<input type="hidden" name="manufacturerName"
										th:value="${manufacturer.manufacturerName}">
									<input type="submit" value="削除" class="btn btn-danger btn-success">
								</form>
							</div>
						</td>
					</tr>
				</tbody>
			</table>

		</div>
		<br>
		<a th:href="@{/}" class="text-center">メニューに戻る</a>



	</div>


	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
