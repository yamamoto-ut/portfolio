<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>削除確認</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container my-5">
        <h2 class="text-center mb-4">削除確認</h2>

        <table class="table table-bordered w-50 mx-auto" th:object="${mtManufacturerRemoveForm}">
            <tbody>
                <tr>
                    <td class="fw-bold">メーカーID</td>
                    <td th:text="*{manufacturerId}"></td>
                </tr>
                <tr>
                    <td class="fw-bold">メーカー名</td>
                    <td th:text="*{manufacturerName}"></td>
                </tr>
            </tbody>
        </table>

        <div class="d-flex justify-content-center gap-3 mt-4">
            <form th:action="@{/mt-confirm-remove-manufacturer}" method="POST"
                  th:object="${mtManufacturerRemoveForm}">
                <input type="hidden" th:field="*{manufacturerId}">
                <input type="hidden" th:field="*{manufacturerName}">
                <input type="submit" value="削除実行" class="btn btn-danger">
            </form>

            <form th:action="@{/manufacturer-remove-show-list}" method="get"
                  th:object="${mtManufacturerRemoveForm}">
                <input type="hidden" th:field="*{manufacturerId}">
                <input type="hidden" th:field="*{manufacturerName}">
                <input type="submit" value="もどる" class="btn btn-secondary">
            </form>
        </div>

        <div class="text-center mt-4">
            <a th:href="@{/}">メニューに戻る</a>
        </div>
    </div>

</body>

</html>
