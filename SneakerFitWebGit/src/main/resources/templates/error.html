<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>エラー</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/mt-style.css}">
</head>

<body class="bg-light">

	<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
		<div class="card shadow-lg border-0 p-4 text-center" style="max-width: 500px; width:100%; border-radius:15px;">

			<h2 class="text-danger fw-bold mb-3">エラー</h2>
			<br>
			<p class="error-msg alert alert-danger">
				エラーが発生しました。
			</p>
			<p class="error-msg fw-semibold text-secondary" th:text="${status} + '　' + ${error}">
			</p>
			<br>

			<div class="mt-3">
				<a th:href="@{/}" class="btn btn-primary px-4">
					メニューに戻る
				</a>
			</div>

		</div>

	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
