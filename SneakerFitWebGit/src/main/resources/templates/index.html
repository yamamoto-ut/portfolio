<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="SneakerFit - 人気スニーカーのレビューが見られる、ユーザー参加型レビューサイト。お気に入りのスニーカーを探したり、自分のレビューを投稿できます。">
	<meta name="keywords" content="スニーカー,レビュー,人気,ユーザー投稿,SneakerFit">
	<title>Home - SneakerFit</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/index.css}">
</head>

<body class="bg-light">

	<!--  ヘッダー  -->
	<nav class="navbar navbar-expand-lg navbar-dark bg-primary ">
		<div class="container">
			<a class="navbar-brand" th:href="@{/}">Sneaker<span class="fw-bold">Fit</span></a>

			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarNav">
				<ul class="navbar-nav ms-auto">
					<li class="nav-item"><a class="nav-link" th:href="@{/}">Home</a></li>
					<li class="nav-item"><a class="nav-link" th:href="@{/about}">About</a></li>
					<!-- 未ログインの人だけ表示-->
					<li class="nav-item" sec:authorize="isAnonymous()"><a class="nav-link" th:href="@{/login}">Login</a>
					</li>

					<!-- ログインの人だけ表示-->
					<li class="nav-item" sec:authorize="isAuthenticated()">
						<form th:action="@{/logout}" method="POST">
							<button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
						</form>
					</li>
				</ul>
			</div>
		</div>
	</nav>
	<!--  ここまでヘッダー  -->
	<!--	justify-content-center : 上下中央に配置。align-items-center : 左右中央に配置。-->
	<!-- ===== Hero セクション ===== -->
	<section class="hero position-relative text-white mb-4">
		<!-- 背景画像 -->
		<div class="hero-section text-center text-white d-flex flex-column justify-content-center align-items-center">
			<h1 class="hero-title">SneakerFit</h1>
			<p class="hero-subtitle">気になるスニーカーのレビューを見つけよう</p>
		</div>
	</section>


	<div class="container mx-auto w-75">
		<!-- 検索フォーム + ユーザーカード -->
		<div class="row g-3 mb-4">
			<!-- 左：検索フォーム（70％） -->
			<div class="col-12 col-md-8">
				<div class="card p-3 shadow-sm h-100">
					<h4>メーカー検索</h4>
					<form th:action="@{/manufacturer-search}" method="get" th:object="${searchForm}">
						<div class="mb-2">
							<label>メーカー名（部分一致）</label>
							<input type="text" th:field="*{manufacturerName}" class="form-control">
						</div>
						<button type="submit" class="btn btn-primary">一覧を表示</button>
					</form>
					<!--検索に該当しなければ、メッセージ-->
					<div th:if="${msg}" class="alert alert-warning mt-2" th:text="${msg}"></div>
				</div>
			</div>

			<!-- 右：ユーザーカード（30％） -->
			<div class="col-12 col-md-4">
				<div class="card p-3 shadow-sm h-100">
					<!-- ログイン済み -->
					<div sec:authorize="isAuthenticated()" class="text-center mb-2">
						<p class="text-muted small mb-1">ログイン中</p>
						<div>ユーザー:  <span sec:authentication="name"></span> さん</div>
						<a th:href="@{/show-review-form}" class="btn btn-primary btn-sm w-100 mt-2">私もレビューする</a>
						<form th:action="@{/logout}" method="POST">
							<button type="submit" class="btn btn-outline-secondary btn-sm w-100 mt-2">ログアウト</button>
						</form>
					</div>

					<!-- 未ログイン ゲスト表示する-->
					<div sec:authorize="isAnonymous()" class="text-center">
						<div>ユーザー: ゲスト  として閲覧中</div>
						<p class="small mb-3 mb-1">無料登録してレビューを投稿しよう！</p>
						<form th:action="@{/user/show-user-regist-form}" method="get" class="mt-2">
							<button type="submit" class="btn btn-outline-secondary btn-sm w-100">新規ユーザー登録</button>
						</form>
						<a th:href="@{/login}" class="btn btn-outline-secondary btn-sm w-100 mt-2">ログイン</a>
					</div>
				</div>
			</div>
		</div>


		<!--タイル式のメーカー  一覧-->
		<!-- メーカー 一覧（中央に配置）-->
		<div th:if="${manufacturerList} != null" class="mx-auto mb-4">
			
			<div class="d-flex align-items-center justify-content-center gap-3 mb-3 px-4 py-2 rounded-3 mx-auto bg-white border shadow-sm mb-3">
			    <h5 class="mb-0 fw-medium">メーカーの一覧</h5>
			    <span class="badge rounded-pill bg-secondary text-white"
			          th:text="'計 ' + ${manufacturerList.size()} + ' 件'">
			    </span>
			</div>
			

			<div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3">
				<div class="col" th:each="manufacturer : ${manufacturerList}">
					<div class="manufacturer-card h-100 p-3 rounded-3 bg-white border">
						<!-- アイコン + メーカー名 -->
						<div class="d-flex align-items-center gap-2 mb-3">
							<div class="manufacturer-icon rounded-circle d-flex align-items-center justify-content-center fw-medium"
								th:data-name="${manufacturer.manufacturerName}">
							</div>
							<p class="fw-medium mb-0 fs-6" th:text="${manufacturer.manufacturerName}"></p>
						</div>

						<!-- レビュー数 + ボタン -->
						<div class="d-flex align-items-center justify-content-between pt-2 border-top">
							<div>
								<span class="fs-5 fw-medium" th:text="${manufacturer.reviewCnt}"></span>
								<span class="text-muted small"> レビュー</span>
							</div>
							<form th:action="@{/search-review}" method="get">
								<input type="hidden" name="manufacturerId" th:value="${manufacturer.manufacturerId}">
								<input type="hidden" name="manufacturerName"
									th:value="${manufacturer.manufacturerName}">
								<button type="submit" class="btn btn-sm btn-outline-secondary px-3">見る →</button>
							</form>
						</div>
					</div>
				</div>
			</div>
		</div>
		<!--tuikaizyutu-->

		<!-- ログインユーザーだけレビューボタン -->
		<div sec:authorize="isAuthenticated()" class="card p-3 mb-3 mx-auto text-center">
			<a th:href="@{/show-review-form}" class="btn btn-outline-secondary">レビューする</a>
		</div>
	</div>
	<!--footer-->
	<footer class="bg-dark text-white mt-5 py-4">
		<div class="container text-center">

			<!-- サイト名 -->
			<h5 class="mb-3">SneakerFit</h5>

			<!-- お問い合わせ -->
			<div class="mb-3">
				<p class="mb-1">お問い合わせ</p>
				<p class="small">sneakerfit@example.com</p>
			</div>

			<!-- コピーライト -->
			<p class="mb-0 small">
				© 2026 SneakerFit. All rights reserved.
			</p>

		</div>
	</footer>
	<!--ここまでフッター-->


	<!-- 管理者専用 -->
	<div sec:authorize="hasRole('ADMIN')" class="card p-3 shadow-sm">
		<h4>管理者用操作</h4>
		<div class="d-flex gap-2 flex-wrap">
			<form th:action="@{/manufacturer-show-regist}" method="POST">
				<button type="submit" class="btn btn-warning">メーカー登録</button>
			</form>
			<form th:action="@{/manufacturer-remove-show-list}" method="GET">
				<button type="submit" class="btn btn-danger">メーカー削除</button>
			</form>
			<form th:action="@{/admin/show-user-regist-form}" method="GET">
				<button type="submit" class="btn btn-secondary">ユーザ管理</button>
			</form>
		</div>
	</div>
	<!-- ここまで管理者専用 -->
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
	<script th:src="@{/js/manufacturer-list-icon.js}"></script>

</body>

</html>
