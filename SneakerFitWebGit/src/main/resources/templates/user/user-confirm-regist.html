<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>ユーザ登録確認</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="bg-body-tertiary">

	<div class="container">

		<div class="row justify-content-center align-items-center" style="min-height: 100vh;">
			<div class="col-12 col-md-8 col-lg-6">

				<div class="card shadow border-0">
					<div class="card-body p-5">

						<h2 class="text-center fw-bold mb-4">ユーザ登録確認</h2>

						
						<table class="table table-bordered" th:object="${userRegistForm}">
							<tbody>
								<tr>
									<td class="fw-semibold">【ユーザID】</td>
									<td th:text="*{userId}"></td>
								</tr>
								<tr>
									<td class="fw-semibold">【パスワード】</td>
									<td th:text="*{password}"></td>
								</tr>
								<tr th:if="*{role} == 'ADMIN'">
									<td class="fw-semibold">【役割】</td>
									<td th:text="*{role}"></td>
								</tr>
							</tbody>
						</table>

						<br>

						<!-- 登録実行ボタン -->
						<form th:action="@{/user/confirm-regist-user}" method="POST" th:object="${userRegistForm}"
							class="d-grid gap-2 mb-2">
							<input type="hidden" th:field="*{userId}">
							<input type="hidden" th:field="*{password}">
							<input type="hidden" th:field="*{role}">
							<input type="submit" value="登録実行" class="btn btn-success">
						</form>

						<!-- 戻るボタン -->
						<form th:action="@{/user/show-user-regist-form}" method="GET" th:object="${userRegistForm}"
							class="d-grid gap-2 mb-3">
							<input type="hidden" th:field="*{userId}">
							<input type="hidden" th:field="*{password}">
							<input type="hidden" th:field="*{role}">
							<input type="submit" value="もどる" class="btn btn-secondary">
						</form>

						<div class="text-center mt-3">
							<a th:href="@{/}" class="btn btn-outline-primary">メニューに戻る</a>
						</div>

					</div>
				</div>

			</div>
		</div>

	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
