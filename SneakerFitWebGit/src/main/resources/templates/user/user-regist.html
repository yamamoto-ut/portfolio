<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>ユーザ登録</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="bg-light">

	<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">

		<div class="card shadow-lg p-4 border-0" style="width: 100%; max-width: 420px;">

			<!-- タイトル -->
			<div class="text-center mb-4">
				<h3 class="fw-bold">ユーザ登録</h3>
				<p class="text-muted small">SneakerFit 新規アカウント作成</p>
			</div>

			<!-- フォーム -->
			<form th:action="@{/user/regist-user}" method="POST" th:object="${userRegistForm}">

				<!-- ユーザID -->
				<div class="mb-3">
					<label class="form-label">ユーザID</label>
					<input type="text" class="form-control" th:field="*{userId}">

					<div th:if="${#fields.hasErrors('userId')}" th:errors="*{userId}" class="text-danger small mt-1">
					</div>
				</div>

				<!-- パスワード -->
				<div class="mb-3">
					<label class="form-label">パスワード</label>
					<input type="password" class="form-control" th:field="*{password}">

					<div th:if="${#fields.hasErrors('password')}" th:errors="*{password}"
						class="text-danger small mt-1">
					</div>
				</div>

				<!-- role（hidden保持）一般ユーザー -->
				<input type="hidden" th:field="*{role}" value="ROLE_USER">
				<div th:if="${#fields.hasErrors('role')}" th:errors="*{role}" class="text-danger small">
				</div>

				<!-- 登録ボタン -->
				<div class="d-grid mt-4">
					<button type="submit" class="btn btn-primary">
						登録する
					</button>
				</div>
			</form>

			<hr>

			<div class="text-center">
				<a th:href="@{/}" class="text-decoration-none small">
					メニューに戻る
				</a>
			</div>

		</div>

	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
